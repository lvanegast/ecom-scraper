version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-scraper-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-scraper-network

  backend:
    build:
      context: ./backend
    container_name: ecom-scraper-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      AMAZON_MAX_PAGES: ${AMAZON_MAX_PAGES:-3}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - ecom-scraper-network

  frontend:
    build:
      context: ./frontend
    container_name: ecom-scraper-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - ecom-scraper-network

  pgadmin:
    image: dpage/pgadmin4:7.4
    container_name: ecom-scraper-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@ecomscraper.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-scraper-network

volumes:
  postgres_data:

networks:
  ecom-scraper-network:
    driver: bridge
