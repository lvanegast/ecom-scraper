version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: ecom-scraper-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.prod or shell}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: production
      AMAZON_MAX_PAGES: ${AMAZON_MAX_PAGES:-3}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - ecom-scraper-network

  frontend:
    build:
      context: ./frontend
    container_name: ecom-scraper-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - ecom-scraper-network

networks:
  ecom-scraper-network:
    driver: bridge
